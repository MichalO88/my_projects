<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Unforgettable Voyages</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #fff;
            text-align: center;
        }

        .container {
            padding: 40px;
            border-radius: 20px;
            background: #f9f9f9;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        h1 {
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        p {
            margin-bottom: 25px;
            color: #555;
            font-size: 1.1em;
        }

        .contact-box {
            display: inline-block;
            padding: 20px 30px;
            background-color: #fff;
            border: 1px solid #eee;
            border-radius: 12px;
            margin-top: 10px;
        }

        .email {
            font-weight: bold;
            color: #2e7d32;
            text-decoration: none;
            font-size: 1.2em;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.9em;
            color: #777;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1a1a1a;
                color: #e0e0e0;
            }

            .container {
                background: #252525;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            }

            h1 {
                color: #fff;
            }

            p {
                color: #bbb;
            }

            .contact-box {
                background-color: #2d2d2d;
                border-color: #444;
            }

            .email {
                color: #4caf50;
            }

            .footer {
                border-color: #333;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Support & Contact</h1>
        <p>If you have any questions, technical issues, or suggestions regarding <strong>Unforgettable Voyages</strong>,
            please feel free to contact us.</p>

        <div class="contact-box">
            <p style="margin-bottom: 5px;">Our support team is available at:</p>
            <a href="mailto:unforgettablevoyages@protonmail.com" class="email">unforgettablevoyages@protonmail.com</a>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 Unforgettable Voyages. All rights reserved.
    </div>
</body>

</html>
