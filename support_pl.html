<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wsparcie - Niezapomniane Podróże</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #fff;
            text-align: center;
        }
        .container {
            padding: 40px;
            border-radius: 20px;
            background: #f9f9f9;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        h1 { color: #1a1a1a; margin-bottom: 20px; }
        p { margin-bottom: 25px; color: #555; font-size: 1.1em; }
        .contact-box {
            display: inline-block;
            padding: 20px 30px;
            background-color: #fff;
            border: 1px solid #eee;
            border-radius: 12px;
            margin-top: 10px;
        }
        .email {
            font-weight: bold;
            color: #2e7d32;
            text-decoration: none;
            font-size: 1.2em;
        }
        .footer { margin-top: 50px; font-size: 0.9em; color: #777; border-top: 1px solid #eee; padding-top: 20px; }
        @media (prefers-color-scheme: dark) {
            body { background-color: #1a1a1a; color: #e0e0e0; }
            .container { background: #252525; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
            h1 { color: #fff; }
            p { color: #bbb; }
            .contact-box { background-color: #2d2d2d; border-color: #444; }
            .email { color: #4caf50; }
            .footer { border-color: #333; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wsparcie i Kontakt</h1>
        <p>Jeśli masz jakiekolwiek pytania, problemy techniczne lub sugestie dotyczące aplikacji <strong>Niezapomniane Podróże</strong>, zapraszamy do kontaktu.</p>
        
        <div class="contact-box">
            <p style="margin-bottom: 5px;">E-mail wsparcia jest dostępny pod adresem:</p>
            <a href="mailto:unforgettablevoyages@protonmail.com" class="email">unforgettablevoyages@protonmail.com</a>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 Niezapomniane Podróże. Wszystkie prawa zastrzeżone.
    </div>
</body>
</html>
